时代与差异:
  - 除心愿社及其配套制度外，2026年的法律、货币、通信、交通与日常生活规则均与现实社会一致。
  - 心愿社是面向成年人的合法公开平台，成人任务被社会视为自愿服务。
平台板块:
  任务发布区:
    - 任务以论坛帖子形式展示，详情包含奖励、地点、截止时间、参与条件、名额和证明要求。
    - 每名用户最多同时接取2条任务、发布1条任务。
    - 发布者设置1至4个名额；帖子显示的是每名接取者可获得的奖励。
    - 发布时按奖励乘名额托管爱心；证明审核通过后向对应接取者结算。
    - 无人接取时可取消并全额退回；已有接取者时，发布者须先与接取者协商，无法达成一致则由平台审核是否取消，并决定托管爱心的退还比例。
    - 平台的任务证明只保存材料类型与摘要，不接收文件原件。
  论坛区:
    - 用户可发帖、回复、点赞、收藏和浏览同城内容。
    - 论坛等级只展示活跃程度，不解锁或限制功能。
  商城区:
    - 主要出售服装、成人用品、拍摄用品和任务道具，统一使用爱心结算。
    - 实物订单随下单后的时间推移，依次更新为待发货、运输中、派送中、已签收。
    - 已签收服装进入衣柜，其他商品进入道具库存。
爱心:
  - 1爱心的价值尺度约等于1元人民币。
  - 可用爱心与托管爱心分别记录，余额不可为负数。
用户与内容边界:
  - 注册、发布、接取和参与任务的用户均为成年人。
  - 发布者须在接取前公开任务内容；参与者明确同意后方可开始，也可随时退出；平台不得公开参与者身份、联系方式或私密材料。
  - 任务不得要求现实中的违法行为，不得牵涉未成年人或未同意的第三方。
界面操作:
  - 发布、接取、购买、点赞、收藏和提交审核只更新平台记录，不会发送站内聊天消息。
  - 执行任务、线下见面和换装必须由参与者亲自完成，平台操作不能代替。
  - 平台内操作写入待处理日志，后续状态以日志中的最新记录为准。
