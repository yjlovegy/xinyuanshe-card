---
变量更新规则:
  世界:
    当前时间:
      format: YYYY年MM月DD日 HH:mm
      check:
        - 事件推进、休息、出行、等待物流或任务截止时更新，时间流逝需符合剧情。
    当前位置:
      type: |-
        {
          国家或地区: string;
          城市: string;
          场所: string;
        }
      check:
        - 只有主角实际移动或场景明确切换时更新。
  主角:
    穿着:
      type: |-
        {
          [部位 in '上衣'|'下装'|'袜子'|'鞋子'|'内衣'|'内裤']: {
            衣物ID: string;
            名称: string;
            状态: string;
          }
        }
      check:
        - 换装、脱下、损坏、弄脏或清洗衣物后更新对应部位；未穿时名称写“未穿”。
    私密状态:
      type: |-
        {
          [部位 in '樱唇'|'双乳'|'小穴'|'玉足'|'肛门'|'子宫']: {
            标签: string;
            描述: string;
          }
        }
      check:
        - 仅在实际事件中发生会造成可感知变化的接触、刺激、疲劳、清洁或恢复后更新。
        - 标签保持简短，描述只记录当前可感知或明确发生的状态，不复述完整过程；子宫状态不得凭空推断。
  账号:
    爱心:
      type: |-
        {
          可用: number;
          托管: number;
        }
      range: 0以上整数
      check:
        - 任务审核通过、发布托管、退款或商城消费时同步更新，任何余额不得为负数。
    论坛经验:
      type: number
      range: 0以上整数
  心愿社:
    当前追踪任务ID:
      check:
        - 只填写我接取的任务ID；没有追踪任务时写“无”。
    任务大厅:
      type: |-
        {
          [任务ID: string]: {
            发布者: string;
            发布者等级: number;
            标题: string;
            正文: string;
            标签: string;
            方式: '线上'|'同城'|'异地'|'指定地点';
            地点: string;
            发布时间: string;
            截止时间: string;
            奖励: number;
            总名额: number;
            已接人数: number;
            参与条件: string;
            证明要求: string;
            匿名: boolean;
            状态: '可接取'|'已满'|'已结束'|'已取消';
            回复: {[回复ID: string]: {作者: string; 内容: string; 时间: string}};
          }
        }
      check:
        - 首次回复及任务数量不足时，结合当前时间、地点和论坛生态补充动态任务，总数保持在8至12条。
        - 补充动态任务时同时生成非性爱任务与性爱任务；两类任务不得使用相同题材、行为要求或露骨程度。
        - 任务核心若是实际发生的具体性行为，包括自慰、口交、性交或肛交时，按实际内容直接使用阴茎、阴道、乳房、口交、性交、肛交、自慰、高潮、射精、精液等相关词汇，并具体写明动作、人数、次数、时长、姿势或强度；只使用与该任务有关的词，不得堆砌。
        - 不得把具体性行为改写成“私密互动”“成人体验”“特别服务”“进一步交流”等含糊代称。
        - 生成性爱任务时，参与条件须明确所有参与者均为具有清醒同意能力的成年人，自愿参加且可随时停止或撤回。
        - 证明要求统一写成“在证明栏填写……”一类站内说明，明确需要记录的材料类型、数量、时长、过程与结果摘要。
        - 任务标题、正文、参与条件和证明要求不得出现“剧情”“AI”“系统生成”“由系统记录”等元叙事词，也不得要求上传真实文件。
        - 所有发布者和参与者均为成年人；任务必须知情、自愿、可撤回，不得涉及未同意的第三方。
        - 过期、满员或已结束任务及时改变状态；与主角无关的旧任务可移除。
    我接取的:
      type: |-
        {
          [任务ID: string]: {
            发布者: string;
            标题: string;
            正文: string;
            标签: string;
            方式: '线上'|'同城'|'异地'|'指定地点';
            地点: string;
            截止时间: string;
            奖励: number;
            参与条件: string;
            证明要求: string;
            任务状态: '已接取'|'进行中'|'可提交'|'审核中'|'已完成'|'失败'|'已放弃';
            证明摘要: string;
            审核状态: '未提交'|'审核中'|'已通过'|'已驳回';
            奖励已结算: boolean;
            互动人物: {
              [人物ID: string]: {
                性别: '男';
                姓名: string;
                年龄: number;
                身高: string;
                穿着: {上衣: string; 下装: string; 鞋子: string; 内裤: string};
                身体状态: {肉棒: {标签: string; 描述: string}};
                内心想法: string;
              } | {
                性别: '女';
                姓名: string;
                年龄: number;
                身高: string;
                罩杯: string;
                穿着: {上衣: string; 下装: string; 袜子: string; 鞋子: string; 内衣: string; 内裤: string};
                身体状态: {
                  樱唇: {标签: string; 描述: string};
                  双乳: {标签: string; 描述: string};
                  小穴: {标签: string; 描述: string};
                  玉足: {标签: string; 描述: string};
                  肛门: {标签: string; 描述: string};
                  子宫: {标签: string; 描述: string};
                };
                内心想法: string;
              };
            };
            私聊: {[消息ID: string]: {发送者: string; 内容: string; 时间: string}};
          }
        }
      check:
        - 最多保留2条未结束任务；任务执行过程中更新状态、互动人物、私聊和证明摘要。
        - 只有玩家实际发送开始任务的消息且事件已经进入任务过程后，才把任务状态改为“进行中”并开始填写互动人物；点击前端按钮或只把文字填入消息框不得视为任务已经开始。
        - 互动人物只记录除主角外、当前正在该任务中与主角直接互动的全部成年人；使用稳定人物ID，同一人物持续更新原记录，不得重复创建。
        - 人物进入互动时添加完整字段；穿着、身体状态和内心想法随实际变化同步更新；人物离开当前互动或互动结束时移除，任务结束后清空。
        - 男性固定记录姓名、年龄、身高、上衣、下装、鞋子、内裤、肉棒状态与内心想法；女性固定记录姓名、年龄、身高、罩杯、六项穿着、樱唇、双乳、小穴、玉足、肛门、子宫状态与内心想法。
        - 身高使用“数字+厘米”，罩杯使用“字母+罩杯”；穿着字段写衣物名称与当前穿着状态，未穿时写“未穿”。
        - 内心想法写人物此刻真实但未必说出口的想法，不因主角查看状态栏而改变人物行为。
        - 只有实际事件已经形成符合帖子要求的证明材料时，才将任务状态改为“可提交”。
        - 审核通过时发放奖励并把奖励已结算改为true，禁止重复结算。
    我发布的:
      type: |-
        {
          [任务ID: string]: {
            标题: string;
            正文: string;
            标签: string;
            方式: '线上'|'同城'|'异地'|'指定地点';
            地点: string;
            发布时间: string;
            截止时间: string;
            奖励: number;
            总名额: number;
            参与条件: string;
            证明要求: string;
            匿名: boolean;
            状态: '招募中'|'进行中'|'审核中'|'已完成'|'已取消';
            托管爱心: number;
            接取者: {[接取者ID: string]: {昵称: string; 状态: string; 证明摘要: string}};
          }
        }
      check:
        - 最多保留1条未结束任务；根据其他成年用户的接取、退出和证明提交更新接取者。
    论坛帖子:
      type: |-
        {
          [帖子ID: string]: {
            作者: string;
            作者等级: number;
            标题: string;
            正文: string;
            分区: '推荐'|'最新'|'同城';
            标签: string;
            发布时间: string;
            点赞数: number;
            已点赞: boolean;
            已收藏: boolean;
            是否我的: boolean;
            回复: {[回复ID: string]: {作者: string; 内容: string; 时间: string}};
          }
        }
      check:
        - 保持近期帖子流动；玩家发帖或回复后，其他用户可在后续剧情中产生回复与通知。
    动态新品:
      type: |-
        {
          [商品ID: string]: {
            名称: string;
            分类: '服装'|'成人用品'|'拍摄用品'|'任务道具';
            描述: string;
            价格: number;
            衣物部位: '上衣'|'下装'|'袜子'|'鞋子'|'内衣'|'内裤'|'非服装';
            图标: string;
          }
        }
      check:
        - 只在剧情事件、平台活动或任务需求带来相关新品时更新，最多保留6件。
    订单:
      type: |-
        {
          [订单ID: string]: {
            商品ID: string;
            商品名: string;
            分类: string;
            衣物部位: string;
            数量: number;
            总价: number;
            状态: '待发货'|'运输中'|'派送中'|'已签收'|'已取消';
            下单时间: string;
            物流说明: string;
          }
        }
      check:
        - 根据下单后的剧情时间推进物流状态，不得无时间流逝直接跨越多个阶段。
    衣柜:
      type: |-
        {
          [衣物ID: string]: {名称: string; 部位: '上衣'|'下装'|'袜子'|'鞋子'|'内衣'|'内裤'; 状态: string};
        }
    道具库存:
      type: |-
        {
          [道具ID: string]: {名称: string; 分类: '成人用品'|'拍摄用品'|'任务道具'; 描述: string; 数量: number};
        }
    通知:
      type: |-
        {
          [通知ID: string]: {类型: '任务'|'论坛'|'商城'|'系统'; 标题: string; 内容: string; 时间: string; 已读: boolean};
        }
    _待处理操作日志:
      type: |-
        {
          [日志ID: string]: {时间: string; 操作: string};
        }
      check:
        - 这些记录由状态栏静默操作写入；生成下一次回复前先逐条读取，将其视为已经发生的平台内事实。
        - 回复末尾的变量更新应移除已经处理过的日志项，避免后续回复重复理解同一操作。
