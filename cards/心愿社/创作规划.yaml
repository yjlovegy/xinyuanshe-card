project:
  name: 心愿社
  worldbookName: 心愿社
  form: charactercard
  mvu: true
  statusbar:
    type: Vue MVU 前端
    source_path: tavern_helper_template/src/心愿社/界面/状态栏
    cdn_url: https://testingcf.jsdelivr.net/gh/yjlovegy/xinyuanshe-card@105af402aaf504716e96a035f1baf7386e05d46e/dist/心愿社/界面/状态栏/index.html
    opening_behavior: 开场白占位符立即显示加载界面；当前楼层 stat_data 完整通过 Schema 校验后再挂载状态栏，避免 MVU 初始化竞态导致首屏空白或 ZodError。
    avatar_storage: 全身像优先保存到浏览器 IndexedDB；必须显式导入存储组合式函数，存储不可用时降级为本次会话内存，不得阻断人物面板渲染。
    user_name_source: 人物页、账户页及平台操作署名优先读取 SillyTavern 当前的实际 <user> 名称；MVU 姓名仅作回退，旧楼层不得因显示名称同步而被改写。
    task_execution_input: 点击“执行任务”只用 /setinput 将“开始执行‘任务标题’任务”填入酒馆消息框，不创建消息、不触发生成，由玩家确认或修改后手动发送。
    labels: 人物页使用“穿着”和带小爱心图标的“身体状态”；发布任务顶部标题使用“说明”。
    thought_display: 主角及当前互动人物均展示“内心想法”；内容必须是人物此时此刻在脑中直接说出的第一人称心声，不使用第三人称叙述、动作概述或旁观分析。
    desktop_layout: 电脑端状态栏取消980像素窄版限制，在消息区域内近乎满宽展示；手机端继续保持单列响应式布局且不得横向溢出。
    history_display: 历史楼层继续保持只读保护，但不显示“历史楼层·只读快照”提示条；历史页板块标题统一显示“当前状态”。
    privacy_display: “我的”页面不显示“隐私与边界”提示条。
    profile_avatar: “我的”页面头像复用人物页上传或网址导入的同一张本地图片；没有图片时才回退显示玩家名称首字。

world:
  overview: 2026年现代社会；与现实的差异是面向成年人的任务平台“心愿社”合法公开运营，成人任务被视为正常的自愿服务。
  regions:
    - name: 上海
      scenes: [独居公寓, 城市街区]
  factions:
    - name: 心愿社
      description: 成年用户可发布、接取和审核任务，也可使用论坛与商城的公开平台。

content_rules:
  task_posts:
    - 每次玩家实际发送消息后，在下一次变量更新中将任务大厅整体刷新为随机3至5条；我接取的任务独立保留，不受大厅刷新影响。
    - 任务池同时保留日常、写真、用品测评等较轻内容与直接的性爱任务。
    - 任务核心若是具体性行为，标题、正文、参与条件和证明要求须直接写明身体部位、行为、次数、时长或强度，不使用“私密互动”“成人体验”“进一步交流”等含糊代称。
    - 露骨程度只跟随任务实际内容；非性爱任务不得添加与任务目标无关的性行为、裸露要求或露骨描述。
  proof_text:
    - 所有用户可见证明要求均使用平台内表达，说明在证明栏需要填写的材料类型、数量、时长、过程或结果摘要。
    - 用户可见证明文案不得出现“剧情”“AI”“系统生成”“由系统记录”等元叙事词。
    - 平台仍只保存文字摘要，不上传或保存真实文件。
  forum_feed:
    - 每次玩家实际发送消息后，在下一次变量更新中将论坛列表整体刷新为随机3至5个帖子，题材、作者、热度及分区保持变化。

characters:
  - name: 主角
    basic:
      age: 21
      gender: 女
      identity: 居住在中国上海的独居女性，心愿社用户
      relationship: 由玩家扮演
    appearance:
      - 身高168厘米
      - D罩杯，胸部曲线明显
      - 外貌与日常气质自然清纯无害，外人通常误以为她缺少性经验
    personality:
      fixed_canon: true
      base: 好奇、坦率面对欲望、重视自主选择
      main: [清纯无害, 温和克制]
      accent: [性经验丰富, 亲密开放, 刺激寻求, 主导与服从双向切换]
    tri_faceted: false

style:
  perspective: 第二人称
  tone: 现代、自然、口语化
  mood: 日常互动

entries:
  - name: 心愿社平台规则
    type: 世界观
    path: 世界书/世界观/心愿社平台规则.yaml
    purpose: 规定平台板块、爱心经济、任务上限、证明审核与成年自愿边界
  - name: 主角_角色档案
    type: 角色
    path: 世界书/角色/主角/角色档案.yaml
    purpose: 固定主角的成年身份、身材、清纯外表与高度开放的私下反差，并明确高强度亲密玩法的同意边界

mvu:
  structure: |
    顶层结构：
    ├── 世界
    │   ├── 当前时间
    │   └── 当前位置
    ├── 主角
    │   ├── 姓名
    │   ├── 内心想法
    │   ├── 穿着
    │   └── 私密状态（樱唇、双乳、小穴、玉足、肛门、子宫）
    ├── 账号
    │   ├── 爱心
    │   ├── 论坛经验
    │   └── 论坛等级
    └── 心愿社
        ├── 当前追踪任务ID
        ├── 任务大厅
        ├── 我接取的
        │   └── 互动人物（按任务分别追踪当前正在互动的全部成年人物）
        ├── 我发布的
        ├── 论坛帖子
        ├── 动态新品
        ├── 订单
        ├── 衣柜
        ├── 道具库存
        ├── 通知
        └── 待处理操作日志
  variables:
    - path: 主角.姓名
      type: string
      initial: <user>
    - path: 主角.内心想法
      type: string
      initial: 我先看看心愿社里有什么。
      check: 始终写成主角此时此刻在脑中直接说出的第一人称心声，随当前处境和明确意图更新。
    - path: 世界.当前时间
      format: YYYY年MM月DD日 HH:mm
    - path: 世界.当前位置
      type: object
    - path: 主角.穿着
      type: z.record
    - path: 主角.私密状态
      type: object
      check: 固定追踪樱唇、双乳、小穴、玉足、肛门、子宫六个部位。
    - path: 账号.爱心
      type: object
    - path: 账号.论坛经验
      type: number
      range: 0以上
    - path: 账号._论坛等级
      type: number
      range: 1以上
    - path: 心愿社.任务大厅
      type: z.record
      check: 每次玩家发送消息后随机刷新为3至5条有效动态任务；性爱任务使用直接露骨且具体的站内文案，证明要求不得出现元叙事词；所有参与者必须成年并自愿。
    - path: 心愿社.我接取的
      type: z.record
      check: 最多同时保留2条未结束任务。
    - path: 心愿社.我接取的.${任务ID}.互动人物
      type: z.record
      check: 任务实际开始后按稳定人物ID同步当前正在互动的全部成年人物；男性与女性使用各自固定字段；每人的内心想法必须是此刻第一人称直接心声，互动结束后移除。
    - path: 心愿社.我发布的
      type: z.record
      check: 最多同时保留1条未结束任务。
    - path: 心愿社.论坛帖子
      type: z.record
      check: 每次玩家发送消息后将可见帖子随机刷新为3至5条，保持作者、分区、题材、回复及热度的变化。
    - path: 心愿社.动态新品
      type: z.record
    - path: 心愿社.订单
      type: z.record
    - path: 心愿社.衣柜
      type: z.record
    - path: 心愿社.道具库存
      type: z.record
    - path: 心愿社.通知
      type: z.record
    - path: 心愿社._待处理操作日志
      type: z.record

first_messages:
  - format: 叙事式
    word_count: 120~200
    output_path: 开场白/0.txt
    scene: 2026年07月20日早晨，上海的独居公寓
    opening_situation: |
      {{user}}从床上醒来，拿起手机，随手打开刚安装的“心愿社”浏览任务大厅、论坛和商城。
      使用简洁自然的第三人称日常叙述，统一用{{user}}代指主角；只作应用入口介绍，不替玩家决定是否接取任务或下一步行动。
      默认初始穿着采用刚睡醒的居家状态：短袖睡衣、宽松睡裤和棉质内裤，袜子、鞋子与内衣未穿。
      结尾必须保留 <StatusPlaceHolderImpl/>，使交互状态栏在开场楼层显示。
