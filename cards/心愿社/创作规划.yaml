project:
  name: 心愿社
  worldbookName: 心愿社
  form: charactercard
  mvu: true
  statusbar:
    type: Vue MVU 前端
    source_path: tavern_helper_template/src/心愿社/界面/状态栏
    cdn_url: https://testingcf.jsdelivr.net/gh/yjlovegy/xinyuanshe-card@a88b408b5b9467efcb29df661cfc2c7be9abf82c/dist/心愿社/界面/状态栏/index.html
    opening_behavior: 开场白占位符立即显示加载界面；当前楼层 stat_data 完整通过 Schema 校验后再挂载状态栏，避免 MVU 初始化竞态导致首屏空白或 ZodError。

world:
  overview: 2026年现代社会；与现实的差异是面向成年人的任务平台“心愿社”合法公开运营，成人任务被视为正常的自愿服务。
  regions:
    - name: 上海
      scenes: [独居公寓, 城市街区]
  factions:
    - name: 心愿社
      description: 成年用户可发布、接取和审核任务，也可使用论坛与商城的公开平台。

characters:
  - name: 主角
    basic:
      age: 21
      gender: 女
      identity: 居住在中国上海的独居女性，心愿社用户
      relationship: 由玩家扮演
    appearance: []
    personality:
      base: 由玩家决定
      main: []
      accent: []
    tri_faceted: false

style:
  perspective: 第二人称
  tone: 现代、自然、口语化
  mood: 日常互动

entries:
  - name: 心愿社平台规则
    type: 世界观
    path: 世界书/世界观/心愿社平台规则.yaml
    purpose: 规定平台板块、爱心经济、任务上限、证明审核与成年自愿边界

mvu:
  structure: |
    顶层结构：
    ├── 世界
    │   ├── 当前时间
    │   └── 当前位置
    ├── 主角
    │   ├── 姓名
    │   ├── 穿着
    │   └── 私密状态
    ├── 账号
    │   ├── 爱心
    │   ├── 论坛经验
    │   └── 论坛等级
    └── 心愿社
        ├── 当前追踪任务ID
        ├── 任务大厅
        ├── 我接取的
        ├── 我发布的
        ├── 论坛帖子
        ├── 动态新品
        ├── 订单
        ├── 衣柜
        ├── 道具库存
        ├── 通知
        └── 待处理操作日志
  variables:
    - path: 世界.当前时间
      format: YYYY年MM月DD日 HH:mm
    - path: 世界.当前位置
      type: object
    - path: 主角.穿着
      type: z.record
    - path: 主角.私密状态
      type: z.record
    - path: 账号.爱心
      type: object
    - path: 账号.论坛经验
      type: number
      range: 0以上
    - path: 账号._论坛等级
      type: number
      range: 1以上
    - path: 心愿社.任务大厅
      type: z.record
      check: 保持不超过12条有效动态任务；所有参与者必须成年并自愿。
    - path: 心愿社.我接取的
      type: z.record
      check: 最多同时保留2条未结束任务。
    - path: 心愿社.我发布的
      type: z.record
      check: 最多同时保留1条未结束任务。
    - path: 心愿社.论坛帖子
      type: z.record
    - path: 心愿社.动态新品
      type: z.record
    - path: 心愿社.订单
      type: z.record
    - path: 心愿社.衣柜
      type: z.record
    - path: 心愿社.道具库存
      type: z.record
    - path: 心愿社.通知
      type: z.record
    - path: 心愿社._待处理操作日志
      type: z.record

first_messages:
  - format: 叙事式
    word_count: 250~400
    output_path: 开场白/0.txt
    scene: 2026年07月20日早晨，上海的独居公寓
    opening_situation: |
      你在醒来后看到手机里刚安装的“心愿社”，首页同时出现任务、论坛、商城和欢迎通知。
      叙述保持第二人称，不替玩家决定姓名、性格或是否接受成人任务；让玩家可以自由浏览应用或先处理现实生活。
      结尾必须保留 <StatusPlaceHolderImpl/>，使交互状态栏在开场楼层显示。
