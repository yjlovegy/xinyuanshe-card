<div style="width: 80%; margin: 20px auto;">
  <details class="thinking-description" style="
    background: #2d2d2d;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: 
      height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.25s ease;
    overflow: hidden;
    will-change: height;
  ">
    <summary style="
      padding: 12px 16px;
      color: #e0e0e0;
      cursor: pointer;
      list-style: none;
      transition: 
        background 0.15s ease,
        border-radius 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      position: relative;
    ">👾变量更新 - <small><span class="thinking-summary" data-close="点击查看 ▶︎ " data-open="点击隐藏 ▼ "></span></small></summary>
    <div style="
      max-height: 300px;
      overflow-y: auto;
      padding: 12px 16px;
      color: #b0b0b0;
      line-height: 1.6;
      transition: 
        opacity 0.2s ease,
        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(-8px);
      opacity: 0;
      white-space: pre-wrap;">
    $2
    </div>
  </details>
</div>

<style>
  /* 滚动条美化，仅限于 .thinking-description 内部 */
  .thinking-description::-webkit-scrollbar {
    width: 6px;
  }

  .thinking-description::-webkit-scrollbar-track {
    background: #2d2d2d;
  }

  .thinking-description::-webkit-scrollbar-thumb {
    background: #404040;
    border-radius: 3px;
  }

  /* 展开状态样式 */
  .thinking-description[open] {
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.24) !important;
  }

  .thinking-description[open]>div {
    transform: translateY(0) !important;
    opacity: 1 !important;
  }

  /* 交互状态 */
  .thinking-description summary:hover {
    background: #363636 !important;
  }

  .thinking-description[open] summary {
    border-radius: 12px 12px 0 0 !important;
  }

  .thinking-description summary::marker {
    display: none;
  }

  /* 文字改变效果 */
  .thinking-description[open] summary .thinking-summary::after {
    content: attr(data-open);
  }

  .thinking-description:not([open]) summary .thinking-summary::after {
    content: attr(data-close);
  }
</style>
