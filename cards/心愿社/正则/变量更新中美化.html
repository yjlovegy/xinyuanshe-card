<div style="width: 80%; margin: 20px auto;">
  <details class="loading-details" style="
    background: #2d2d2d;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition:
      height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.25s ease;
    overflow: hidden;
    will-change: height;
  ">
    <summary style="
      padding: 12px 16px;
      color: #e0e0e0;
      cursor: pointer;
      list-style: none;
      transition:
        background 0.15s ease,
        border-radius 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      position: relative;
      background: #363636;
      overflow: hidden;
    ">
      👾变量更新 - <small>正在更新...</small>
      <span class="shimmer-effect" style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.14),
          rgba(255, 255, 255, 0.20),
          rgba(255, 255, 255, 0.14),
          rgba(255, 255, 255, 0.06),
          transparent
        );
        animation: shimmer 2s linear infinite;
        transform: translateX(-100%);
      "></span>
    </summary>
    <div style="
      max-height: 300px;
      overflow-y: auto;
      padding: 12px 16px;
      color: #b0b0b0;
      line-height: 1.6;
      transition:
        opacity 0.2s ease,
        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(-8px);
      opacity: 0;
      white-space: pre-wrap; /* 保留换行符和空格 */
    ">
    $2
    </div>
  </details>
</div>

<style>
  /* 滚动条美化，仅限于 .loading-details 内部 */
  .loading-details::-webkit-scrollbar {
    width: 6px;
  }
  .loading-details::-webkit-scrollbar-track {
    background: #2d2d2d;
  }
  .loading-details::-webkit-scrollbar-thumb {
    background: #404040;
    border-radius: 3px;
  }

  /* 展开状态样式 */
  .loading-details[open] {
    box-shadow: 0 4px 16px rgba(0,0,0,0.24) !important;
  }
  .loading-details[open] > div {
    transform: translateY(0) !important;
    opacity: 1 !important;
  }
  .loading-details[open] > summary > .shimmer-effect {
    animation: none !important;
    background: transparent !important;
  }
  .loading-details[open] > summary {
    background: #363636 !important;
  }

  /* 交互状态 */
  .loading-details summary:hover {
    background: #363636 !important;
  }
  .loading-details[open] summary {
    border-radius: 12px 12px 0 0 !important;
  }
  .loading-details summary::marker {
    display: none;
  }

  /* 流光动画 Keyframes */
  @keyframes shimmer {
    100% {
      transform: translateX(100%);
    }
  }
</style>
